<script>
export default {
	name: "letter-demo",
	props: {
		data: {
			type: Object,
			default: () => {},
		},
	},
	data() {
		return {
			styleTag: null,
		};
	},
	watch: {
		"data.style": {
			immediate: true,
			handler(val) {
				this.insertStyle(val);
			},
		},
	},
	methods: {
		insertStyle(style) {
			if (this.styleTag) {
				document.body.removeChild(this.styleTag);
			}
			this.styleTag = document.createElement("style");
			this.styleTag.textContent = style;
			document.body.appendChild(this.styleTag);
		},
	},
};
</script>
